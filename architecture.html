<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>OYNAME Engine - Architektur</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: #0a0a0a;
            color: white;
        }
        
        /* Navigation - Logo links, Links zentriert in der Mitte */
        .navbar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            z-index: 150;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
            transition: background 0.3s;
        }
        
        .logo img {
            width: 275px;
            height: 40px;
            display: block;
        }
        
        .nav-links {
            display: flex;
            gap: 30px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);  /* Zentriert die Links */
        }
        
        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }
        
        .nav-links a:hover {
            color: #0078f2;
        }
        
        /* Platzhalter rechts für Balance (damit Logo links und Links zentriert sind) */
        .navbar-placeholder {
            width: 275px;  /* Gleiche Breite wie Logo */
            visibility: hidden;
        }
        
        /* Hauptcontainer - OHNE Hero-Bild */
        .main-container {
            margin-top: 100px;  /* Platz für fixierte Navbar */
            padding: 40px 20px;
            min-height: 100vh;
            background: #0a0a0a;  /* Einfach dunkler Hintergrund */
        }
        
        /* Container für die Architektur */
        .architecture-content {
            max-width: 1000px;
            margin: 0 auto;  /* Zentriert */
            padding: 40px;
            background: rgba(20, 20, 30, 0.7);
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            line-height: 1.6;
        }

        /* Markdown-Styling */
        .architecture-content h1 { 
            color: #0078f2; 
            font-size: 2.5em; 
            margin-bottom: 20px; 
            border-bottom: 2px solid #0078f2;
            padding-bottom: 10px;
        }
        
        .architecture-content h2 { 
            color: #00a8f2; 
            margin: 40px 0 20px;
            font-size: 2em;
        }
        
        .architecture-content h3 { 
            color: #4db8ff; 
            margin: 30px 0 15px; 
            font-size: 1.5em;
        }
        
        .architecture-content p { 
            margin-bottom: 20px;
            color: #e0e0e0;
        }
        
        .architecture-content code { 
            background: #1e1e2e; 
            padding: 2px 6px; 
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            color: #ffa657;
        }
        
        .architecture-content pre { 
            background: #1a1a24; 
            padding: 20px; 
            border-radius: 8px; 
            overflow-x: auto; 
            border-left: 4px solid #0078f2;
            margin: 25px 0;
        }
        
        .architecture-content pre code {
            background: none;
            color: #e0e0e0;
            padding: 0;
        }
        
        .architecture-content ul, 
        .architecture-content ol { 
            margin: 20px 0 20px 30px; 
        }
        
        .architecture-content li {
            margin-bottom: 10px;
            color: #e0e0e0;
        }
        
        .architecture-content a { 
            color: #0078f2; 
            text-decoration: none; 
        }
        
        .architecture-content a:hover { 
            text-decoration: underline; 
        }
        
        .architecture-content blockquote { 
            border-left: 4px solid #0078f2; 
            background: rgba(0,120,242,0.1);
            padding: 20px 25px; 
            margin: 25px 0; 
            border-radius: 0 8px 8px 0;
            color: #b0b0b0;
            font-style: italic;
        }

        /* Lade-Animation */
        .loading {
            text-align: center;
            padding: 60px;
            color: #888;
        }

        .error {
            text-align: center;
            padding: 60px;
            color: #ff6b6b;
            border: 1px solid #ff6b6b;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <img src="oynameengine_logo.png" width="275" height="40" alt="OYNAME Engine">
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="architektur.html">Architecture</a>
            <a href="#">API Reference</a>
            <a href="#">Documentation</a>
            <a href="#">Learning</a>
        </div>
        <div class="navbar-placeholder"></div> <!-- Für perfekte Balance -->
    </nav>

    <!-- Hauptcontainer OHNE Hero-Bild -->
    <div class="main-container">
        <div class="architecture-content" id="markdown-container">
            <div class="loading">📄 Lade Architektur-Dokument...</div>
        </div>
    </div>

    <!-- Showdown für Markdown -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/showdown/2.1.0/showdown.min.js"></script>
    
    <script>
        fetch('https://raw.githubusercontent.com/oyname/oyname.github.io/main/ARCHITECTURE.md')
            .then(response => {
                if (!response.ok) throw new Error('Datei nicht gefunden');
                return response.text();
            })
            .then(markdown => {
                const converter = new showdown.Converter({
                    tables: true,
                    ghCompatibleHeaderId: true,
                    simplifiedAutoLink: true,
                    strikethrough: true
                });
                const html = converter.makeHtml(markdown);
                document.getElementById('markdown-container').innerHTML = html;
            })
            .catch(error => {
                document.getElementById('markdown-container').innerHTML = 
                    '<div class="error">❌ Fehler beim Laden: ' + error.message + '</div>';
            });
    </script>
</body>
</html>
